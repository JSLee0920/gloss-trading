services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB}'
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
    ports:
      - '5433:5432'
    volumes:
      - 'postgres-data:/var/lib/postgresql'
  redis:
    image: 'redis:latest'
    ports:
      - '6379:6379'
  kafka:
    image: 'apache/kafka:latest'
    ports:
      - '9092:9092'

volumes:
  postgres-data:
