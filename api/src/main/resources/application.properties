spring.application.name=demo

# Load local secrets from api/.env (gitignored). Optional so prod can inject
# the same keys as real environment variables instead.
spring.config.import=optional:file:.env[.properties]

# Datasource — Postgres from compose.yaml (host-mapped port 5432)
spring.datasource.url=jdbc:postgresql://localhost:5433/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# JPA — schema owned by Flyway, Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=gloss
spring.kafka.consumer.auto-offset-reset=earliest
